name: Publish

# This workflow lives inside the `server/` component directory. It assumes
# `server/` is its own git repository, so the repository root here is the server
# sources and the Docker build context `.` is correct.
#
# On push to `main` it builds the binaries + Docker image, pushes the `dev`
# Docker tag, and updates a single rolling non-prerelease GitHub *dev* release
# in place (its tag is force-moved to the latest commit). Only one `dev` release
# exists at a time. The Docker image is also tagged `dev`.
#
# Pushing a tag starting with `v` (e.g. `v1.2.3`) publishes a *formal release*
# instead: the Docker image is also tagged `latest`, and a non-prerelease GitHub
# release is created from the tag.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Serialize runs so concurrent pushes don't race.
concurrency:
  group: publish-server-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.vars.outputs.date }}
      day: ${{ steps.vars.outputs.day }}
      tag: ${{ steps.vars.outputs.tag }}
      is_prerelease: ${{ steps.vars.outputs.is_prerelease }}
      release_name: ${{ steps.vars.outputs.release_name }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Formal release: use the pushed tag (e.g. v1.2.3) verbatim.
            TAG="${GITHUB_REF#refs/tags/}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # Push to main / manual dispatch: a single rolling `dev` release is
            # updated in place (tag force-moved to the latest commit).
            # Non-prerelease. The build version still records dev-<short-sha>
            # so artifacts identify the exact commit.
            TAG="dev"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=dev" >> "$GITHUB_OUTPUT"
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "day=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  docker:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vgate-server
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ startsWith(needs.prepare.outputs.tag, 'v') }}
            type=raw,value=${{ needs.prepare.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ needs.prepare.outputs.date }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binaries:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUT="vgate-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -ldflags="-s -w -X github.com/vgate-project/vgate-server/config.date=${{ needs.prepare.outputs.date }} -X github.com/vgate-project/vgate-server/config.version=${{ needs.prepare.outputs.version }}" \
            -o "$OUT" .

      - name: Package artifact
        run: |
          OUT="vgate-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          tar -czf "$OUT.tar.gz" "$OUT"
          zip -r "$OUT.zip" "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  release:
    needs: [prepare, binaries]
    runs-on: ubuntu-latest
    steps:
      # The rolling `dev` release reuses one fixed tag. Force-move the tag to the
      # current commit so the release page shows the right commit hash.
      # Skipped for formal v* releases — those must never be force-pushed.
      - name: Checkout (needed to force-move tag)
        if: needs.prepare.outputs.tag == 'dev'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Move dev tag to current commit
        if: needs.prepare.outputs.tag == 'dev'
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "$TAG"

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Check if dev release already exists
        id: rel
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            gh release view "$TAG" --json body -q .body > notes.md
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            : > notes.md
          fi

      # First push: let GitHub generate the notes once (produces the changelog link).
      - name: Create dev release (first time)
        if: steps.rel.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

      # Later pushes: reuse the previously generated notes (no changelog churn).
      - name: Update dev release (keep notes)
        if: steps.rel.outputs.exists == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: false
          generate_release_notes: false
          body_path: notes.md
          files: |
            dist/*.tar.gz
            dist/*.zip
