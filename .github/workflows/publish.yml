name: Publish

# This workflow lives inside the `server/` component directory. It assumes
# `server/` is its own git repository, so the repository root here is the server
# sources and the Docker build context `.` is correct.
#
# On every push to `main` it builds the binaries + Docker image and publishes a
# *pre-release*. To avoid flooding the releases page, only ONE pre-release is
# produced per calendar day: the tag `pre-YYYY-MM-DD` is reused, so every push
# within the same day updates the same pre-release (latest commit wins).
#
# Pushing a tag starting with `v` (e.g. `v1.2.3`) publishes a *formal release*
# instead: the Docker image is also tagged `latest`, and a non-prerelease GitHub
# release is created from the tag.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Serialize runs so concurrent pushes don't race when creating/updating the
# daily pre-release.
concurrency:
  group: publish-server-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.vars.outputs.date }}
      day: ${{ steps.vars.outputs.day }}
      tag: ${{ steps.vars.outputs.tag }}
      is_prerelease: ${{ steps.vars.outputs.is_prerelease }}
      release_name: ${{ steps.vars.outputs.release_name }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Formal release: use the pushed tag (e.g. v1.2.3) verbatim.
            TAG="${GITHUB_REF#refs/tags/}"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # Pre-release (push to main / manual dispatch): daily tag.
            TAG="pre-$(date -u +%Y-%m-%d)"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Pre-release $(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "day=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  docker:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vgate-server
          tags: |
            type=sha
            type=raw,value=dev,enable=${{ needs.prepare.outputs.is_prerelease == 'true' }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_prerelease == 'false' }}
            type=raw,value=${{ needs.prepare.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ needs.prepare.outputs.date }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binaries:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          OUT="vgate-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -ldflags="-s -w -X github.com/vgate-project/vgate-server/config.date=${{ needs.prepare.outputs.date }} -X github.com/vgate-project/vgate-server/config.version=${{ needs.prepare.outputs.version }}" \
            -o "dist/$OUT" .

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [prepare, binaries]
    runs-on: ubuntu-latest
    steps:
      # Only one pre-release per day: remove any existing daily pre-release
      # (and its tag) so the next step recreates it from the latest commit.
      # Skipped for formal `v*` releases — those must never be deleted/overwritten.
      - name: Remove existing daily pre-release if present
        if: needs.prepare.outputs.is_prerelease == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" -y --cleanup-tag
          fi

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: dist/*
